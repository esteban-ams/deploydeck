<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeployDeck</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f5f5f5;
      --surface:   #ffffff;
      --border:    #e0e0e0;
      --text:      #1a1a1a;
      --text-muted:#555555;
      --text-dim:  #888888;
      --font:      -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      --mono:      'SF Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
      --success:   #16a34a;
      --failed:    #dc2626;
      --running:   #ca8a04;
      --rolled:    #ea580c;
      --pending:   #6b7280;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.5;
      min-height: 100vh;
    }

    .page { max-width: 1280px; margin: 0 auto; padding: 0 24px 48px; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
      padding: 18px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-text { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -0.01em; }
    .version-badge {
      font-size: 0.72rem; font-family: var(--mono);
      background: #f0f0f0; color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 2px 8px; border-radius: 2px;
    }
    .header-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .secret-form { display: flex; align-items: center; gap: 8px; }
    .secret-label { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }
    .secret-input {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); font-family: var(--mono); font-size: 0.78rem;
      padding: 5px 10px; border-radius: 2px;
      width: 180px; outline: none; transition: border-color 0.12s;
    }
    .secret-input:focus { border-color: #999; }
    .docs-link {
      font-size: 0.78rem; color: var(--text-muted); text-decoration: none;
      border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px;
      white-space: nowrap; background: var(--surface);
      transition: background 0.1s, color 0.1s;
    }
    .docs-link:hover { background: #f0f0f0; color: var(--text); }
    .refresh-info { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 2px;
      font-size: 0.8rem; font-weight: 500; font-family: var(--font);
      cursor: pointer; border: 1px solid var(--border);
      background: var(--surface); color: var(--text-muted);
      transition: background 0.1s, border-color 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: #f0f0f0; color: var(--text); border-color: #ccc; }
    .btn:active:not(:disabled) { background: #e8e8e8; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-danger {
      color: var(--failed); border-color: #fca5a5;
    }
    .btn-danger:hover:not(:disabled) { background: #fef2f2; border-color: #f87171; }
    .btn-sm { padding: 3px 9px; font-size: 0.75rem; }

    /* Banner */
    .banner {
      display: flex; align-items: center; gap: 10px;
      background: #fffbeb; border: 1px solid #fde68a;
      color: #92400e; padding: 9px 14px; border-radius: 2px;
      font-size: 0.82rem; margin-bottom: 20px;
    }
    .banner.hidden { display: none; }

    /* Sections */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim);
    }
    .section-count {
      font-size: 0.72rem; color: var(--text-dim);
      background: var(--surface); padding: 1px 7px;
      border-radius: 2px; border: 1px solid var(--border);
    }

    /* Services grid */
    .services-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 12px; margin-bottom: 36px;
    }
    .service-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 16px;
      border-left-width: 3px;
    }
    .service-card.status-success     { border-left-color: var(--success); }
    .service-card.status-failed      { border-left-color: var(--failed); }
    .service-card.status-running     { border-left-color: var(--running); }
    .service-card.status-rolled_back { border-left-color: var(--rolled); }
    .service-card.status-pending     { border-left-color: var(--pending); }

    .service-card-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px; margin-bottom: 12px;
    }
    .service-name { font-size: 0.9rem; font-weight: 600; color: var(--text); word-break: break-all; }

    /* Status badges */
    .status-badge {
      display: inline-block;
      font-size: 0.7rem; font-weight: 600;
      padding: 2px 7px; border-radius: 2px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge-success     { background: #dcfce7; color: var(--success); }
    .badge-failed      { background: #fee2e2; color: var(--failed); }
    .badge-running     { background: #fef9c3; color: var(--running); }
    .badge-rolled_back { background: #ffedd5; color: var(--rolled); }
    .badge-pending     { background: #f3f4f6; color: var(--pending); }

    .service-meta { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .meta-row { display: flex; align-items: baseline; gap: 8px; }
    .meta-key {
      font-size: 0.68rem; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 0.06em;
      width: 42px; flex-shrink: 0;
    }
    .meta-val {
      font-size: 0.76rem; color: var(--text-muted); font-family: var(--mono);
      word-break: break-all; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; max-width: 200px;
    }

    .service-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 12px; border-top: 1px solid var(--border);
    }
    .time-ago { font-size: 0.71rem; color: var(--text-dim); }

    /* Empty states */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px; padding: 40px 24px;
      text-align: center; color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 2px;
    }
    .empty-state p { font-size: 0.82rem; }

    /* Table */
    .table-wrapper {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 9px 14px; text-align: left;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.07em; text-transform: uppercase;
      color: var(--text-dim); background: #fafafa;
      border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 9px 14px; font-size: 0.8rem; color: var(--text-muted); vertical-align: middle; }
    tbody td.mono { font-family: var(--mono); font-size: 0.74rem; }
    tbody td.service-col { font-weight: 600; color: var(--text); }
    .duration-val { font-family: var(--mono); font-size: 0.74rem; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0; pointer-events: none; transition: opacity 0.15s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px;
      width: 100%; max-width: 860px; max-height: 80vh;
      display: flex; flex-direction: column;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .modal-title { font-size: 0.88rem; font-weight: 600; }
    .modal-meta { display: flex; align-items: center; gap: 10px; margin-top: 4px; flex-wrap: wrap; }
    .modal-meta-item { font-size: 0.71rem; color: var(--text-dim); font-family: var(--mono); }
    .modal-close {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); width: 26px; height: 26px;
      border-radius: 2px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 1rem; line-height: 1;
      transition: background 0.1s;
    }
    .modal-close:hover { background: #f0f0f0; color: var(--text); }
    .modal-body { overflow-y: auto; padding: 12px 0; flex: 1; }

    /* Log viewer */
    .log-lines { font-family: var(--mono); font-size: 0.73rem; line-height: 1.7; color: var(--text); }
    .log-line { display: flex; gap: 0; padding: 0 18px; }
    .log-line:hover { background: #fafafa; }
    .log-num { color: var(--text-dim); min-width: 36px; user-select: none; text-align: right; padding-right: 14px; flex-shrink: 0; }
    .log-text { word-break: break-all; white-space: pre-wrap; }
    .log-text.level-error { color: var(--failed); }
    .log-text.level-warn  { color: var(--running); }
    .log-empty { padding: 28px 18px; text-align: center; color: var(--text-dim); font-family: var(--mono); font-size: 0.78rem; }

    .modal-footer {
      padding: 10px 18px; border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .log-count { font-size: 0.71rem; color: var(--text-dim); }

    /* Spinner */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--text-dim);
      border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 28px 0; }

    /* Responsive */
    @media (max-width: 700px) {
      .header { flex-direction: column; align-items: flex-start; }
      .header-right { width: 100%; }
      .secret-input { width: 100%; flex: 1; }
      .secret-form { width: 100%; }
      table { display: block; overflow-x: auto; }
      .modal { max-height: 90vh; }
    }
    @media (max-width: 480px) { .page { padding: 0 16px 40px; } }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="header-left">
      <span class="logo-text">DeployDeck</span>
      <span class="version-badge" id="version-badge">v&mdash;</span>
    </div>
    <div class="header-right">
      <div class="secret-form">
        <span class="secret-label">API Secret</span>
        <input
          class="secret-input"
          id="secret-input"
          type="password"
          placeholder="webhook-secret"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="btn btn-sm" id="save-secret-btn">Save</button>
      </div>
      <a class="docs-link" href="https://esteban-ams.github.io/deploydeck/docs/" target="_blank" rel="noopener">Docs</a>
      <span class="refresh-info" id="last-updated">&mdash;</span>
    </div>
  </header>

  <div class="banner hidden" id="no-secret-banner">
    Enter your API secret above to view deployments.
  </div>

  <div class="section-header">
    <span class="section-title">Services</span>
    <span class="section-count" id="services-count">0</span>
  </div>
  <div class="services-grid" id="services-grid">
    <div class="empty-state">
      <p>No services deployed yet.</p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section-header">
    <span class="section-title">Deployment History</span>
    <span class="section-count" id="history-count">0</span>
  </div>
  <div class="table-wrapper" id="history-wrapper">
    <div class="empty-state" style="border:none; border-radius:0;">
      <p>No deployments found.</p>
    </div>
  </div>

</div>

<div class="modal-overlay" id="log-modal" role="dialog" aria-modal="true" aria-label="Deployment logs">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="modal-title">Logs</div>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <button class="modal-close" id="modal-close-btn" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body">
      <div class="log-lines" id="log-lines">
        <div class="log-empty">Select a deployment to view its logs.</div>
      </div>
    </div>
    <div class="modal-footer">
      <span class="log-count" id="log-line-count"></span>
      <button class="btn btn-sm" id="modal-close-footer-btn">Close</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var SECRET_KEY       = 'deploydeck_secret';
  var REFRESH_INTERVAL = 10000;

  var allDeployments = [];

  /* DOM */
  var secretInput        = document.getElementById('secret-input');
  var saveSecretBtn      = document.getElementById('save-secret-btn');
  var lastUpdated        = document.getElementById('last-updated');
  var versionBadge       = document.getElementById('version-badge');
  var noSecretBanner     = document.getElementById('no-secret-banner');
  var servicesGrid       = document.getElementById('services-grid');
  var servicesCount      = document.getElementById('services-count');
  var historyWrapper     = document.getElementById('history-wrapper');
  var historyCount       = document.getElementById('history-count');
  var logModal           = document.getElementById('log-modal');
  var modalTitle         = document.getElementById('modal-title');
  var modalMeta          = document.getElementById('modal-meta');
  var logLines           = document.getElementById('log-lines');
  var logLineCount       = document.getElementById('log-line-count');
  var modalCloseBtn      = document.getElementById('modal-close-btn');
  var modalCloseFooter   = document.getElementById('modal-close-footer-btn');

  /* ---- storage ---- */
  function getSecret() { return localStorage.getItem(SECRET_KEY) || ''; }
  function setSecret(v) {
    if (v) { localStorage.setItem(SECRET_KEY, v); }
    else   { localStorage.removeItem(SECRET_KEY); }
  }

  /* ---- format helpers ---- */
  function formatAgo(iso) {
    if (!iso) return '\u2014';
    var diff = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (diff < 5)    return 'just now';
    if (diff < 60)   return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
  }

  function formatDuration(startIso, endIso) {
    if (!startIso) return '\u2014';
    var end  = endIso ? new Date(endIso) : new Date();
    var secs = Math.floor((end - new Date(startIso)) / 1000);
    if (secs < 0)  return '\u2014';
    if (secs < 60) return secs + 's';
    var m = Math.floor(secs / 60);
    var s = secs % 60;
    if (m < 60) return s > 0 ? m + 'm ' + s + 's' : m + 'm';
    var h  = Math.floor(m / 60);
    var rm = m % 60;
    return rm > 0 ? h + 'h ' + rm + 'm' : h + 'h';
  }

  function formatDateTime(iso) {
    if (!iso) return '\u2014';
    var d = new Date(iso);
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })
         + ' ' + d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function truncate(str, n) {
    if (!str) return '\u2014';
    return str.length > n ? str.slice(0, n) + '\u2026' : str;
  }

  /* ---- safe DOM helpers ---- */
  function esc(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function setText(el, txt) { el.textContent = txt; }

  function clearEl(el) {
    while (el.firstChild) { el.removeChild(el.firstChild); }
  }

  /* ---- status badge ---- */
  function makeBadge(status) {
    var labels = {
      success: 'Success', failed: 'Failed', running: 'Running',
      rolled_back: 'Rolled back', pending: 'Pending'
    };
    var span = document.createElement('span');
    span.className = 'status-badge badge-' + esc(status);
    span.appendChild(document.createTextNode(labels[status] || status));
    return span;
  }

  /* ---- API ---- */
  function apiFetch(path, options) {
    options = options || {};
    var secret = getSecret();
    var headers = { 'Content-Type': 'application/json' };
    if (secret) { headers['X-DeployDeck-Secret'] = secret; }
    return fetch(path, Object.assign({}, options, { headers: headers }))
      .then(function (res) {
        return res.json().then(function (body) {
          if (!res.ok) { throw new Error(body.error || ('HTTP ' + res.status)); }
          return body;
        });
      });
  }

  /* ---- empty state ---- */
  function makeEmptyState(msg, extraStyle) {
    var wrap = document.createElement('div');
    wrap.className = 'empty-state';
    if (extraStyle) { wrap.setAttribute('style', extraStyle); }
    var p = document.createElement('p');
    setText(p, msg);
    wrap.appendChild(p);
    return wrap;
  }

  /* ---- build services grid ---- */
  function buildServicesGrid(deployments) {
    var latest = new Map();
    deployments.forEach(function (d) {
      if (!latest.has(d.service) ||
          new Date(d.started_at) > new Date(latest.get(d.service).started_at)) {
        latest.set(d.service, d);
      }
    });

    setText(servicesCount, latest.size);
    clearEl(servicesGrid);

    if (latest.size === 0) {
      servicesGrid.appendChild(makeEmptyState('No services deployed yet.'));
      return;
    }

    var entries = [];
    latest.forEach(function (d) { entries.push(d); });
    entries.sort(function (a, b) { return a.service.localeCompare(b.service); });

    entries.forEach(function (d) {
      var status      = d.status || 'pending';
      var image       = d.image  || '\u2014';
      var mode        = d.mode   || '\u2014';
      var canRollback = d.rollback_tag && (status === 'success' || status === 'failed');

      var card = document.createElement('div');
      card.className = 'service-card status-' + esc(status);

      /* top row */
      var top = document.createElement('div');
      top.className = 'service-card-top';

      var nameEl = document.createElement('span');
      nameEl.className = 'service-name';
      setText(nameEl, d.service);

      top.appendChild(nameEl);
      top.appendChild(makeBadge(status));
      card.appendChild(top);

      /* meta */
      var meta = document.createElement('div');
      meta.className = 'service-meta';

      function metaRow(key, val) {
        var row = document.createElement('div');
        row.className = 'meta-row';
        var k = document.createElement('span');
        k.className = 'meta-key';
        setText(k, key);
        var v = document.createElement('span');
        v.className = 'meta-val';
        v.title = val;
        setText(v, truncate(val, 38));
        row.appendChild(k);
        row.appendChild(v);
        return row;
      }

      meta.appendChild(metaRow('image', image));
      meta.appendChild(metaRow('mode',  mode));
      meta.appendChild(metaRow('id',    d.id));
      card.appendChild(meta);

      /* footer */
      var footer = document.createElement('div');
      footer.className = 'service-footer';

      var ago = document.createElement('span');
      ago.className = 'time-ago';
      setText(ago, formatAgo(d.started_at));

      var rollBtn = document.createElement('button');
      rollBtn.className = 'btn btn-danger btn-sm';
      setText(rollBtn, 'Rollback');
      rollBtn.disabled = !canRollback;
      rollBtn.title = canRollback ? 'Rollback to previous image' : 'No rollback tag available';
      (function (svc) {
        rollBtn.addEventListener('click', function () { confirmRollback(svc); });
      }(d.service));

      footer.appendChild(ago);
      footer.appendChild(rollBtn);
      card.appendChild(footer);

      servicesGrid.appendChild(card);
    });
  }

  /* ---- build history table ---- */
  function buildHistoryTable(deployments) {
    setText(historyCount, deployments.length);
    clearEl(historyWrapper);

    if (deployments.length === 0) {
      historyWrapper.appendChild(makeEmptyState('No deployments found.', 'border:none; border-radius:0;'));
      return;
    }

    var sorted = deployments.slice().sort(function (a, b) {
      return new Date(b.started_at) - new Date(a.started_at);
    });

    var table = document.createElement('table');
    var thead = document.createElement('thead');
    var headerRow = document.createElement('tr');
    ['Service', 'Status', 'Image', 'Started', 'Duration', 'Actions'].forEach(function (h) {
      var th = document.createElement('th');
      setText(th, h);
      headerRow.appendChild(th);
    });
    thead.appendChild(headerRow);
    table.appendChild(thead);

    var tbody = document.createElement('tbody');

    sorted.forEach(function (d) {
      var tr = document.createElement('tr');

      var tdSvc = document.createElement('td');
      tdSvc.className = 'service-col';
      setText(tdSvc, d.service);

      var tdStatus = document.createElement('td');
      tdStatus.appendChild(makeBadge(d.status || 'pending'));

      var tdImage = document.createElement('td');
      tdImage.className = 'mono';
      tdImage.title = d.image || '';
      setText(tdImage, truncate(d.image, 40));

      var tdStarted = document.createElement('td');
      setText(tdStarted, formatDateTime(d.started_at));

      var tdDur = document.createElement('td');
      tdDur.className = 'duration-val';
      setText(tdDur, formatDuration(d.started_at, d.completed_at));

      var tdAct = document.createElement('td');
      var logsBtn = document.createElement('button');
      logsBtn.className = 'btn btn-sm';
      setText(logsBtn, 'View Logs');
      (function (dep) {
        logsBtn.addEventListener('click', function () {
          openLogs(dep.id, dep.service, dep.status, dep.started_at);
        });
      }(d));
      tdAct.appendChild(logsBtn);

      tr.appendChild(tdSvc);
      tr.appendChild(tdStatus);
      tr.appendChild(tdImage);
      tr.appendChild(tdStarted);
      tr.appendChild(tdDur);
      tr.appendChild(tdAct);
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    historyWrapper.appendChild(table);
  }

  /* ---- fetch data ---- */
  function fetchHealth() {
    return apiFetch('/api/health').then(function (data) {
      setText(versionBadge, data.version ? 'v' + data.version : 'dev');
    }).catch(function () {
      setText(versionBadge, 'offline');
    });
  }

  function fetchDeployments() {
    var secret = getSecret();
    if (!secret) {
      noSecretBanner.classList.remove('hidden');

      clearEl(servicesGrid);
      servicesGrid.appendChild(makeEmptyState('Enter your API secret to load service data.'));

      clearEl(historyWrapper);
      historyWrapper.appendChild(makeEmptyState('Authentication required.', 'border:none; border-radius:0;'));
      return Promise.resolve();
    }

    noSecretBanner.classList.add('hidden');

    return apiFetch('/api/deployments').then(function (data) {
      allDeployments = data.deployments || [];
      buildServicesGrid(allDeployments);
      buildHistoryTable(allDeployments);
      var now = new Date();
      setText(lastUpdated, 'Updated ' + now.toLocaleTimeString(undefined, {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      }));
    }).catch(function (err) {
      setText(lastUpdated, 'Update failed: ' + err.message);
    });
  }

  function refreshAll() {
    return Promise.all([fetchHealth(), fetchDeployments()]);
  }

  /* ---- rollback ---- */
  function confirmRollback(service) {
    var ok = window.confirm(
      'Roll back service "' + service + '" to the previous image?\n\n' +
      'This will restart the container with the last known good image.'
    );
    if (!ok) return;

    apiFetch('/api/rollback/' + encodeURIComponent(service), { method: 'POST' })
      .then(function () {
        setTimeout(refreshAll, 1500);
      })
      .catch(function (err) {
        alert('Rollback failed: ' + err.message);
      });
  }

  /* ---- log modal ---- */
  function classifyLogLine(line) {
    var l = line.toLowerCase();
    if (/\b(error|err|fatal|panic|exception)\b/.test(l)) return 'level-error';
    if (/\b(warn|warning)\b/.test(l)) return 'level-warn';
    return 'level-info';
  }

  function openLogs(id, service, status, startedAt) {
    setText(modalTitle, 'Logs \u2014 ' + service);

    clearEl(modalMeta);
    var idSpan = document.createElement('span');
    idSpan.className = 'modal-meta-item';
    setText(idSpan, id);

    var sep1 = document.createElement('span');
    sep1.className = 'modal-meta-item';
    setText(sep1, '\u00b7');

    var sep2 = document.createElement('span');
    sep2.className = 'modal-meta-item';
    setText(sep2, '\u00b7');

    var dtSpan = document.createElement('span');
    dtSpan.className = 'modal-meta-item';
    setText(dtSpan, formatDateTime(startedAt));

    modalMeta.appendChild(idSpan);
    modalMeta.appendChild(sep1);
    modalMeta.appendChild(makeBadge(status || 'pending'));
    modalMeta.appendChild(sep2);
    modalMeta.appendChild(dtSpan);

    clearEl(logLines);
    var loading = document.createElement('div');
    loading.className = 'log-empty';
    var spinner = document.createElement('span');
    spinner.className = 'spinner';
    loading.appendChild(spinner);
    logLines.appendChild(loading);
    setText(logLineCount, '');

    logModal.classList.add('open');
    document.body.style.overflow = 'hidden';

    apiFetch('/api/deployments/' + encodeURIComponent(id) + '/logs')
      .then(function (data) {
        var lines = data.logs || [];
        clearEl(logLines);

        if (lines.length === 0) {
          var empty = document.createElement('div');
          empty.className = 'log-empty';
          setText(empty, 'No log output available for this deployment.');
          logLines.appendChild(empty);
          setText(logLineCount, '0 lines');
          return;
        }

        setText(logLineCount, lines.length + ' line' + (lines.length !== 1 ? 's' : ''));

        var frag = document.createDocumentFragment();
        lines.forEach(function (line, i) {
          var row = document.createElement('div');
          row.className = 'log-line';

          var num = document.createElement('span');
          num.className = 'log-num';
          setText(num, i + 1);

          var txt = document.createElement('span');
          txt.className = 'log-text ' + classifyLogLine(line);
          setText(txt, line);

          row.appendChild(num);
          row.appendChild(txt);
          frag.appendChild(row);
        });

        logLines.appendChild(frag);

        var body = logModal.querySelector('.modal-body');
        if (status === 'running') {
          body.scrollTop = body.scrollHeight;
        } else {
          body.scrollTop = 0;
        }
      })
      .catch(function (err) {
        clearEl(logLines);
        var errDiv = document.createElement('div');
        errDiv.className = 'log-empty';
        errDiv.style.color = 'var(--failed)';
        setText(errDiv, 'Failed to load logs: ' + err.message);
        logLines.appendChild(errDiv);
      });
  }

  function closeLogs() {
    logModal.classList.remove('open');
    document.body.style.overflow = '';
  }

  /* ---- event listeners ---- */
  saveSecretBtn.addEventListener('click', function () {
    var val = secretInput.value.trim();
    setSecret(val);
    refreshAll();
  });

  secretInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { saveSecretBtn.click(); }
  });

  modalCloseBtn.addEventListener('click', closeLogs);
  modalCloseFooter.addEventListener('click', closeLogs);

  logModal.addEventListener('click', function (e) {
    if (e.target === logModal) { closeLogs(); }
  });

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && logModal.classList.contains('open')) { closeLogs(); }
  });

  /* ---- init ---- */
  var saved = getSecret();
  if (saved) { secretInput.value = saved; }

  refreshAll();
  setInterval(refreshAll, REFRESH_INTERVAL);

}());
</script>
</body>
</html>
