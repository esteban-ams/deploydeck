  <style>
    /* ============================================
   DeployDeck - Landing Page Styles
   ============================================ */

/* --- Reset & Base --- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --ocean: #0A1628;
  --ocean-light: #0F2035;
  --ocean-mid: #142842;
  --surface: #1A3250;
  --teal: #00D4AA;
  --teal-dim: rgba(0, 212, 170, 0.15);
  --amber: #FFB547;
  --amber-dim: rgba(255, 181, 71, 0.12);
  --text: #E2E8F0;
  --text-dim: #94A3B8;
  --text-bright: #F8FAFC;
  --border: rgba(255, 255, 255, 0.06);
  --radius: 8px;
  --radius-lg: 12px;
  --max-width: 1140px;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-sans);
  background: var(--ocean);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

a {
  color: var(--teal);
  text-decoration: none;
  transition: color 0.2s;
}

a:hover {
  color: var(--amber);
}

.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 24px;
}

/* --- Navigation --- */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 16px 0;
  background: rgba(10, 22, 40, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s;
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 1.15rem;
  color: var(--text-bright);
}

.nav-logo svg {
  width: 28px;
  height: 28px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 28px;
  list-style: none;
}

.nav-links a {
  color: var(--text-dim);
  font-size: 0.9rem;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-links a:hover {
  color: var(--text-bright);
}

.nav-cta {
  background: var(--teal);
  color: var(--ocean) !important;
  padding: 8px 18px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 0.85rem;
  transition: opacity 0.2s;
}

.nav-cta:hover {
  opacity: 0.9;
  color: var(--ocean) !important;
}

/* Mobile nav toggle */
.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 4px;
}

.nav-toggle svg {
  width: 24px;
  height: 24px;
}

@media (max-width: 768px) {
  .nav-toggle {
    display: block;
  }

  .nav-links {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    flex-direction: column;
    background: rgba(10, 22, 40, 0.97);
    padding: 20px 24px;
    gap: 16px;
    border-bottom: 1px solid var(--border);
  }

  .nav-links.open {
    display: flex;
  }
}

/* --- Hero --- */
.hero {
  padding: 160px 0 100px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -40%;
  right: -20%;
  width: 700px;
  height: 700px;
  background: radial-gradient(circle, rgba(0, 212, 170, 0.06) 0%, transparent 70%);
  pointer-events: none;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--teal-dim);
  color: var(--teal);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
  margin-bottom: 24px;
  border: 1px solid rgba(0, 212, 170, 0.2);
}

.hero-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  background: var(--teal);
  border-radius: 50%;
}

.hero h1 {
  font-size: 3.5rem;
  font-weight: 800;
  line-height: 1.1;
  color: var(--text-bright);
  margin-bottom: 8px;
  letter-spacing: -0.03em;
}

.hero-tagline {
  font-size: 1.25rem;
  color: var(--teal);
  font-weight: 600;
  margin-bottom: 16px;
}

.hero-subtitle {
  font-size: 1.1rem;
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 32px;
  max-width: 500px;
}

.hero-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--amber);
  color: var(--ocean);
  padding: 14px 28px;
  border-radius: var(--radius);
  font-weight: 700;
  font-size: 0.95rem;
  transition: transform 0.15s, box-shadow 0.15s;
  border: none;
  cursor: pointer;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(255, 181, 71, 0.3);
  color: var(--ocean);
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--text);
  padding: 14px 28px;
  border-radius: var(--radius);
  font-weight: 600;
  font-size: 0.95rem;
  border: 1px solid rgba(255, 255, 255, 0.15);
  transition: border-color 0.2s, background 0.2s;
  cursor: pointer;
}

.btn-secondary:hover {
  border-color: var(--teal);
  background: var(--teal-dim);
  color: var(--text-bright);
}

.btn-secondary svg {
  width: 18px;
  height: 18px;
}

/* --- Terminal Animation --- */
.terminal {
  background: #0D1117;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
}

.terminal-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 14px 18px;
  background: #161B22;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.terminal-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.terminal-dot:nth-child(1) { background: #FF5F57; }
.terminal-dot:nth-child(2) { background: #FFBD2E; }
.terminal-dot:nth-child(3) { background: #28C840; }

.terminal-title {
  flex: 1;
  text-align: center;
  font-size: 0.75rem;
  color: #484F58;
  font-family: var(--font-mono);
}

.terminal-body {
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.8;
  min-height: 260px;
}

.terminal-line {
  opacity: 0;
  animation: terminalFadeIn 0.3s ease forwards;
  white-space: nowrap;
}

.terminal-line:nth-child(1)  { animation-delay: 0.3s; }
.terminal-line:nth-child(2)  { animation-delay: 1.0s; }
.terminal-line:nth-child(3)  { animation-delay: 1.7s; }
.terminal-line:nth-child(4)  { animation-delay: 2.4s; }
.terminal-line:nth-child(5)  { animation-delay: 3.1s; }
.terminal-line:nth-child(6)  { animation-delay: 3.8s; }
.terminal-line:nth-child(7)  { animation-delay: 4.5s; }
.terminal-line:nth-child(8)  { animation-delay: 5.2s; }
.terminal-line:nth-child(9)  { animation-delay: 5.9s; }

@keyframes terminalFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

.t-prompt { color: var(--teal); }
.t-cmd    { color: #E2E8F0; }
.t-flag   { color: #79C0FF; }
.t-ok     { color: #3FB950; }
.t-info   { color: #8B949E; }
.t-warn   { color: var(--amber); }
.t-dim    { color: #484F58; }

@media (max-width: 768px) {
  .hero {
    padding: 120px 0 60px;
  }

  .hero-grid {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .hero h1 {
    font-size: 2.4rem;
  }

  .terminal-body {
    font-size: 0.72rem;
    overflow-x: auto;
  }
}

/* --- Section Shared --- */
.section {
  padding: 100px 0;
  position: relative;
}

.section-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
}

.section-label::before {
  content: '';
  width: 20px;
  height: 2px;
  background: var(--teal);
}

.section-title {
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}

.section-desc {
  font-size: 1.05rem;
  color: var(--text-dim);
  max-width: 560px;
  line-height: 1.7;
}

/* --- Features --- */
.features {
  background: var(--ocean-light);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.features-header {
  text-align: center;
  margin-bottom: 56px;
}

.features-header .section-desc {
  margin: 0 auto;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.feature-card {
  background: var(--ocean-mid);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px 28px;
  transition: border-color 0.25s, transform 0.2s;
}

.feature-card:hover {
  border-color: rgba(0, 212, 170, 0.25);
  transform: translateY(-2px);
}

.feature-icon {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--teal-dim);
  border-radius: var(--radius);
  margin-bottom: 18px;
  color: var(--teal);
}

.feature-icon svg {
  width: 22px;
  height: 22px;
}

.feature-card h3 {
  font-size: 1.05rem;
  font-weight: 650;
  color: var(--text-bright);
  margin-bottom: 8px;
}

.feature-card p {
  font-size: 0.9rem;
  color: var(--text-dim);
  line-height: 1.6;
}

@media (max-width: 900px) {
  .features-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 580px) {
  .features-grid {
    grid-template-columns: 1fr;
  }
}

/* --- How It Works --- */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 32px;
  margin-top: 56px;
}

.step {
  position: relative;
  text-align: center;
  padding: 36px 24px;
}

.step-number {
  width: 48px;
  height: 48px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--teal-dim);
  border: 2px solid rgba(0, 212, 170, 0.3);
  border-radius: 50%;
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--teal);
  margin-bottom: 20px;
}

.step h3 {
  font-size: 1.1rem;
  font-weight: 650;
  color: var(--text-bright);
  margin-bottom: 10px;
}

.step p {
  font-size: 0.92rem;
  color: var(--text-dim);
  line-height: 1.6;
}

/* Connector lines between steps */
.step:not(:last-child)::after {
  content: '';
  position: absolute;
  top: 60px;
  right: -16px;
  width: 32px;
  height: 2px;
  background: linear-gradient(to right, rgba(0, 212, 170, 0.4), rgba(0, 212, 170, 0.1));
}

@media (max-width: 768px) {
  .steps-grid {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  .step:not(:last-child)::after {
    display: none;
  }
}

/* --- Quick Start --- */
.quickstart {
  background: var(--ocean-light);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.quickstart-header {
  margin-bottom: 40px;
}

.code-block {
  background: #0D1117;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
  border: 1px solid rgba(255, 255, 255, 0.05);
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  background: #161B22;
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

.code-tab {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: #8B949E;
}

.code-copy {
  background: none;
  border: 1px solid rgba(255, 255, 255, 0.1);
  color: #8B949E;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 0.72rem;
  cursor: pointer;
  font-family: var(--font-sans);
  transition: color 0.2s, border-color 0.2s;
}

.code-copy:hover {
  color: var(--text);
  border-color: var(--teal);
}

.code-body {
  padding: 20px;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.9;
  overflow-x: auto;
  white-space: pre;
}

.code-body .comment {
  color: #6E7681;
}

.code-body .string {
  color: #A5D6FF;
}

.code-body .key {
  color: #7EE787;
}

.code-body .value {
  color: #79C0FF;
}

.code-body .prompt {
  color: var(--teal);
  user-select: none;
}

/* --- Footer --- */
.footer {
  padding: 48px 0;
  border-top: 1px solid var(--border);
}

.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.footer-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  color: var(--text-dim);
  font-size: 0.9rem;
}

.footer-brand svg {
  width: 20px;
  height: 20px;
  color: var(--teal);
}

.footer-links {
  display: flex;
  align-items: center;
  gap: 24px;
  list-style: none;
}

.footer-links a {
  color: var(--text-dim);
  font-size: 0.85rem;
  transition: color 0.2s;
}

.footer-links a:hover {
  color: var(--text-bright);
}

.footer-note {
  width: 100%;
  text-align: center;
  font-size: 0.8rem;
  color: #475569;
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

/* --- Utility --- */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}

/* ============================================
   Documentation Page Styles
   ============================================ */

/* --- Docs Layout --- */
.docs-layout {
  display: flex;
  min-height: 100vh;
  padding-top: 65px;
}

/* --- Sidebar --- */
.docs-sidebar {
  position: fixed;
  top: 65px;
  left: 0;
  bottom: 0;
  width: 280px;
  background: var(--ocean-light);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 50;
  scrollbar-width: thin;
  scrollbar-color: var(--ocean-mid) transparent;
}

.docs-sidebar::-webkit-scrollbar {
  width: 4px;
}

.docs-sidebar::-webkit-scrollbar-track {
  background: transparent;
}

.docs-sidebar::-webkit-scrollbar-thumb {
  background: var(--ocean-mid);
  border-radius: 4px;
}

.docs-sidebar-inner {
  padding: 24px 0;
}

.docs-sidebar-header {
  padding: 0 20px 16px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 16px;
}

.docs-sidebar-title {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.docs-nav {
  padding: 0 12px;
}

.docs-nav-group {
  margin-bottom: 20px;
}

.docs-nav-group-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 6px 12px;
  margin-bottom: 4px;
}

.docs-nav-link {
  display: block;
  padding: 5px 12px 5px 20px;
  font-size: 0.84rem;
  color: var(--text-dim);
  border-radius: 6px;
  transition: color 0.15s, background 0.15s;
  line-height: 1.5;
  border-left: 2px solid transparent;
}

.docs-nav-link:hover {
  color: var(--text-bright);
  background: rgba(255, 255, 255, 0.03);
}

.docs-nav-link.active {
  color: var(--teal);
  background: var(--teal-dim);
  border-left-color: var(--teal);
}

/* --- Mobile sidebar toggle --- */
.docs-sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 60;
  background: var(--teal);
  color: var(--ocean);
  border: none;
  border-radius: 28px;
  padding: 12px 20px;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: var(--font-sans);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  align-items: center;
  gap: 8px;
}

.docs-sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 45;
}

/* --- Docs Main Content --- */
.docs-main {
  flex: 1;
  margin-left: 280px;
  min-width: 0;
}

.docs-content {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

/* --- Docs Typography --- */
.docs-section {
  padding-bottom: 48px;
  margin-bottom: 48px;
  border-bottom: 1px solid var(--border);
}

.docs-section:last-child {
  border-bottom: none;
}

.docs-content h2 {
  font-size: 2rem;
  font-weight: 800;
  color: var(--text-bright);
  margin-bottom: 12px;
  padding-top: 12px;
  letter-spacing: -0.02em;
}

.docs-content h3 {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-top: 40px;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.docs-content h4 {
  font-size: 1.05rem;
  font-weight: 650;
  color: var(--teal);
  margin-top: 28px;
  margin-bottom: 10px;
}

.docs-content p {
  font-size: 0.95rem;
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 16px;
}

.docs-content ul,
.docs-content ol {
  margin-bottom: 16px;
  padding-left: 24px;
}

.docs-content li {
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 6px;
}

.docs-content strong {
  color: var(--text-bright);
  font-weight: 650;
}

.docs-content blockquote {
  border-left: 3px solid var(--amber);
  background: var(--amber-dim);
  padding: 14px 20px;
  margin: 16px 0;
  border-radius: 0 var(--radius) var(--radius) 0;
}

.docs-content blockquote p {
  margin-bottom: 0;
  color: var(--text);
  font-size: 0.9rem;
}

.docs-content a {
  color: var(--teal);
  text-decoration: underline;
  text-underline-offset: 2px;
}

.docs-content a:hover {
  color: var(--amber);
}

.docs-content hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 32px 0;
}

/* --- Docs Code Blocks --- */
.docs-content pre {
  background: #0D1117;
  border-radius: var(--radius-lg);
  overflow-x: auto;
  padding: 20px;
  margin: 16px 0 24px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
}

.docs-content pre code {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  line-height: 1.8;
  color: #E2E8F0;
  background: none;
  padding: 0;
  border-radius: 0;
}

.docs-content code {
  font-family: var(--font-mono);
  font-size: 0.85em;
  background: var(--ocean-mid);
  color: var(--teal);
  padding: 2px 6px;
  border-radius: 4px;
}

/* --- Docs Syntax Highlighting --- */
.docs-content pre code .comment,
.docs-content pre .comment {
  color: #6E7681;
}

.docs-content pre code .keyword,
.docs-content pre .keyword {
  color: #FF7B72;
}

.docs-content pre code .string,
.docs-content pre .string {
  color: #A5D6FF;
}

.docs-content pre code .number,
.docs-content pre .number {
  color: #79C0FF;
}

.docs-content pre code .function,
.docs-content pre .function {
  color: #D2A8FF;
}

.docs-content pre code .type,
.docs-content pre .type {
  color: #7EE787;
}

/* --- Docs Tables --- */
.docs-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0 24px;
  font-size: 0.88rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.docs-content thead {
  background: var(--ocean-mid);
}

.docs-content th {
  padding: 10px 16px;
  text-align: left;
  font-weight: 650;
  color: var(--text-bright);
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  border-bottom: 1px solid var(--border);
}

.docs-content td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  vertical-align: top;
}

.docs-content td code {
  font-size: 0.8em;
  white-space: nowrap;
}

.docs-content tbody tr:hover {
  background: rgba(255, 255, 255, 0.02);
}

/* --- Responsive Docs --- */
@media (max-width: 960px) {
  .docs-sidebar {
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 55;
    width: 280px;
  }

  .docs-sidebar.open {
    transform: translateX(0);
  }

  .docs-sidebar.open + .docs-sidebar-overlay {
    display: block;
  }

  .docs-sidebar-toggle {
    display: flex;
  }

  .docs-main {
    margin-left: 0;
  }

  .docs-content {
    padding: 32px 24px 80px;
  }
}

@media (max-width: 580px) {
  .docs-content {
    padding: 24px 16px 80px;
  }

  .docs-content h2 {
    font-size: 1.6rem;
  }

  .docs-content h3 {
    font-size: 1.15rem;
  }

  .docs-content pre {
    padding: 14px;
    border-radius: var(--radius);
  }

  .docs-content pre code {
    font-size: 0.75rem;
  }

  .docs-content table {
    display: block;
    overflow-x: auto;
  }
}

/* Subtle grid pattern overlay */
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(0, 212, 170, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 170, 0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
  -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent);
}

  </style>
</head>
<body>
  
  <script>
  
  document.querySelectorAll('a[href^="#"]').forEach(function(anchor) {
    anchor.addEventListener('click', function(e) {
      var target = document.querySelector(this.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        
        var navLinks = document.querySelector('.nav-links');
        if (navLinks) navLinks.classList.remove('open');
      }
    });
  });

  
  function copyCode(btn) {
    var code = btn.closest('.code-block').querySelector('.code-body').textContent;
    navigator.clipboard.writeText(code).then(function() {
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
    });
  }
</script>

</body>
