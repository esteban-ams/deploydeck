@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap');

/* --- Reset & Base --- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #111116;
  --bg-raised: #19191f;
  --bg-surface: #1f1f27;
  --border: rgba(255, 255, 255, 0.07);
  --border-strong: rgba(255, 255, 255, 0.12);
  --accent: #E8553D;
  --accent-dim: rgba(232, 85, 61, 0.1);
  --accent-glow: rgba(232, 85, 61, 0.15);
  --text: #a8a8b3;
  --text-bright: #ededf0;
  --text-muted: #5e5e6e;
  --text-faint: #3d3d4a;
  --font-display: 'DM Serif Display', Georgia, 'Times New Roman', serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', 'Fira Code', Consolas, monospace;
  --max-width: 1100px;
  --radius: 6px;
  --radius-lg: 10px;

  /* docs compat aliases */
  --ocean: #111116;
  --ocean-light: #19191f;
  --ocean-mid: #1f1f27;
  --surface: #1f1f27;
  --teal: #E8553D;
  --teal-dim: rgba(232, 85, 61, 0.1);
  --amber: #E8553D;
  --amber-dim: rgba(232, 85, 61, 0.08);
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
  overflow-x: hidden;
}

section[id] {
  scroll-margin-top: 80px;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Noise grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 200px 200px;
}

a {
  color: var(--text);
  text-decoration: none;
  transition: color 0.2s;
}

a:hover {
  color: var(--text-bright);
}

.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 0 28px;
}

/* --- Navigation --- */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 0;
  background: rgba(17, 17, 22, 0.9);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-body);
  font-weight: 600;
  font-size: 0.92rem;
  color: var(--text-bright);
  letter-spacing: -0.01em;
}

.nav-logo svg {
  width: 22px;
  height: 22px;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 8px;
  list-style: none;
}

.nav-links a {
  color: var(--text-muted);
  font-size: 0.82rem;
  font-weight: 400;
  padding: 6px 12px;
  border-radius: var(--radius);
  transition: color 0.15s, background 0.15s;
}

.nav-links a:hover {
  color: var(--text-bright);
  background: rgba(255, 255, 255, 0.04);
}

.nav-cta {
  background: var(--bg-surface) !important;
  color: var(--text) !important;
  border: 1px solid var(--border-strong);
  font-weight: 500 !important;
}

.nav-cta:hover {
  border-color: var(--accent) !important;
  color: var(--text-bright) !important;
}

/* Mobile nav toggle */
.nav-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 4px;
}

.nav-toggle svg {
  width: 20px;
  height: 20px;
}

@media (max-width: 768px) {
  .nav-toggle {
    display: block;
  }

  .nav-links {
    display: none;
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    flex-direction: column;
    background: rgba(17, 17, 22, 0.97);
    padding: 16px 20px;
    gap: 4px;
    border-bottom: 1px solid var(--border);
  }

  .nav-links.open {
    display: flex;
  }

  .nav-links a {
    padding: 10px 12px;
  }
}

/* --- Hero --- */
.hero {
  padding: 140px 0 80px;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
  pointer-events: none;
  opacity: 0.4;
}

.hero::after {
  display: none;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1.1fr;
  gap: 48px;
  align-items: start;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 20px;
}

.hero-badge::before {
  content: '';
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
}

.hero h1 {
  font-family: var(--font-display);
  font-size: 3.8rem;
  font-weight: 400;
  line-height: 1.05;
  color: var(--text-bright);
  margin-bottom: 12px;
  letter-spacing: -0.03em;
}

.hero-tagline {
  font-size: 1.05rem;
  color: var(--accent);
  font-weight: 400;
  margin-bottom: 20px;
  letter-spacing: -0.01em;
}

.hero-subtitle {
  font-size: 0.95rem;
  color: var(--text);
  line-height: 1.7;
  margin-bottom: 36px;
  max-width: 420px;
}

.hero-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: #fff;
  padding: 11px 24px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 0.88rem;
  transition: transform 0.12s, box-shadow 0.2s;
  border: none;
  cursor: pointer;
  letter-spacing: -0.01em;
}

.btn-primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(232, 85, 61, 0.2);
  color: #fff;
}

.btn-secondary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--text);
  padding: 11px 24px;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-weight: 500;
  font-size: 0.88rem;
  border: 1px solid var(--border-strong);
  transition: border-color 0.2s, color 0.2s;
  cursor: pointer;
  letter-spacing: -0.01em;
}

.btn-secondary:hover {
  border-color: var(--text-muted);
  color: var(--text-bright);
}

.btn-secondary svg {
  width: 16px;
  height: 16px;
}

/* --- Terminal --- */
.terminal {
  background: #0c0c10;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow:
    0 24px 48px rgba(0, 0, 0, 0.4),
    0 0 0 1px rgba(255, 255, 255, 0.03);
  margin-top: 8px;
}

.terminal-header {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 12px 16px;
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid var(--border);
}

.terminal-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}

.terminal-dot:nth-child(1) { background: #ff5f57; }
.terminal-dot:nth-child(2) { background: #febc2e; }
.terminal-dot:nth-child(3) { background: #28c840; }

.terminal-title {
  flex: 1;
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-muted);
  font-family: var(--font-mono);
}

.terminal-body {
  padding: 18px 18px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.85;
  min-height: 240px;
}

.terminal-line {
  opacity: 0;
  animation: termIn 0.25s ease forwards;
  white-space: nowrap;
}

.terminal-line:nth-child(1) { animation-delay: 0.2s; }
.terminal-line:nth-child(2) { animation-delay: 0.8s; }
.terminal-line:nth-child(3) { animation-delay: 1.4s; }
.terminal-line:nth-child(4) { animation-delay: 2.0s; }
.terminal-line:nth-child(5) { animation-delay: 2.5s; }
.terminal-line:nth-child(6) { animation-delay: 3.0s; }
.terminal-line:nth-child(7) { animation-delay: 3.4s; }
.terminal-line:nth-child(8) { animation-delay: 3.8s; }
.terminal-line:nth-child(9) { animation-delay: 4.2s; }

@keyframes termIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}

.t-prompt { color: var(--text-muted); }
.t-cmd    { color: var(--text-bright); }
.t-flag   { color: #7da1c4; }
.t-ok     { color: #5cb85c; }
.t-info   { color: var(--text-muted); }
.t-warn   { color: var(--accent); }
.t-dim    { color: var(--text-muted); }

@media (max-width: 768px) {
  .hero {
    padding: 110px 0 60px;
  }

  .hero-grid {
    grid-template-columns: 1fr;
    gap: 36px;
  }

  .hero h1 {
    font-size: 2.6rem;
  }

  .terminal-body {
    font-size: 0.7rem;
    overflow-x: auto;
  }
}

/* --- Section Shared --- */
.section {
  padding: 88px 0;
  position: relative;
}

.section-label {
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}

.section-title {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 400;
  color: var(--text-bright);
  margin-bottom: 12px;
  letter-spacing: -0.02em;
  line-height: 1.15;
}

.section-desc {
  font-size: 0.95rem;
  color: var(--text);
  max-width: 480px;
  line-height: 1.7;
}

/* --- Features --- */
.features {
  border-top: 1px solid var(--border);
}

.features-header {
  margin-bottom: 48px;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.feature-card {
  background: var(--bg);
  padding: 32px 28px;
}

.feature-card:hover {
  background: var(--bg-raised);
}

.feature-icon {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  color: var(--text-muted);
}

.feature-icon svg {
  width: 20px;
  height: 20px;
}

.feature-card h3 {
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.feature-card p {
  font-size: 0.84rem;
  color: var(--text);
  line-height: 1.6;
}

@media (max-width: 900px) {
  .features-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}

@media (max-width: 580px) {
  .features-grid {
    grid-template-columns: 1fr;
  }
}

/* --- How It Works --- */
.steps-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0;
  margin-top: 48px;
  position: relative;
}

/* connector line */
.steps-grid::before {
  content: '';
  position: absolute;
  top: 19px;
  left: calc(16.666% + 12px);
  right: calc(16.666% + 12px);
  height: 1px;
  background: var(--border-strong);
}

.step {
  position: relative;
  text-align: center;
  padding: 0 20px;
}

.step-number {
  width: 38px;
  height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-raised);
  border: 1px solid var(--border-strong);
  border-radius: 50%;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-muted);
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
}

.step h3 {
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.step p {
  font-size: 0.84rem;
  color: var(--text);
  line-height: 1.6;
}

.step:not(:last-child)::after {
  display: none;
}

@media (max-width: 768px) {
  .steps-grid {
    grid-template-columns: 1fr;
    gap: 32px;
  }

  .steps-grid::before {
    display: none;
  }

  .step {
    text-align: left;
    display: grid;
    grid-template-columns: 38px 1fr;
    gap: 0 16px;
    padding: 0;
  }

  .step-number {
    grid-row: 1 / 3;
    margin-bottom: 0;
  }

  .step h3 {
    align-self: end;
  }
}

/* --- Quick Start --- */
.quickstart {
  border-top: 1px solid var(--border);
}

.quickstart-header {
  margin-bottom: 32px;
}

.code-block {
  background: #0c0c10;
  border-radius: var(--radius-lg);
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

.code-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  background: rgba(255, 255, 255, 0.02);
  border-bottom: 1px solid var(--border);
}

.code-tab {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
}

.code-copy {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-muted);
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 0.7rem;
  cursor: pointer;
  font-family: var(--font-body);
  transition: color 0.15s, border-color 0.15s;
}

.code-copy:hover {
  color: var(--text-bright);
  border-color: var(--text-muted);
}

.code-body {
  padding: 18px;
  font-family: var(--font-mono);
  font-size: 0.78rem;
  line-height: 1.85;
  overflow-x: auto;
  white-space: pre;
}

.code-body .comment { color: #5e5e6e; }
.code-body .string  { color: #7da1c4; }
.code-body .key     { color: #a0c980; }
.code-body .value   { color: #7da1c4; }
.code-body .prompt  { color: var(--text-muted); user-select: none; }

/* --- Footer --- */
.footer {
  padding: 40px 0;
  border-top: 1px solid var(--border);
}

.footer-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.footer-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 500;
  color: var(--text-muted);
  font-size: 0.84rem;
}

.footer-brand svg {
  width: 18px;
  height: 18px;
}

.footer-links {
  display: flex;
  align-items: center;
  gap: 20px;
  list-style: none;
}

.footer-links a {
  color: var(--text-muted);
  font-size: 0.8rem;
  transition: color 0.15s;
}

.footer-links a:hover {
  color: var(--text-bright);
}

.footer-note {
  width: 100%;
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-faint);
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
}

/* --- Utility --- */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}

/* ============================================
   Documentation Page Styles
   ============================================ */

/* --- Docs Layout --- */
.docs-layout {
  display: flex;
  min-height: 100vh;
  padding-top: 56px;
}

/* --- Sidebar --- */
.docs-sidebar {
  position: fixed;
  top: 56px;
  left: 0;
  bottom: 0;
  width: 280px;
  background: var(--bg-raised);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  z-index: 50;
  scrollbar-width: thin;
  scrollbar-color: var(--bg-surface) transparent;
}

.docs-sidebar::-webkit-scrollbar {
  width: 4px;
}

.docs-sidebar::-webkit-scrollbar-track {
  background: transparent;
}

.docs-sidebar::-webkit-scrollbar-thumb {
  background: var(--bg-surface);
  border-radius: 4px;
}

.docs-sidebar-inner {
  padding: 24px 0;
}

.docs-sidebar-header {
  padding: 0 20px 16px;
  margin-bottom: 8px;
}

.docs-sidebar-title {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.02em;
}

.docs-nav {
  padding: 0 16px;
}

.docs-nav-group {
  margin-bottom: 18px;
}

.docs-nav-group-title {
  font-size: 0.72rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 0;
  margin-bottom: 2px;
}

.docs-nav-link {
  display: block;
  padding: 4px 0 4px 12px;
  font-size: 0.83rem;
  color: #64748B;
  transition: color 0.15s;
  line-height: 1.5;
  border-left: 1px solid rgba(255, 255, 255, 0.06);
}

.docs-nav-link:hover {
  color: var(--text-bright);
}

.docs-nav-link.active {
  color: var(--text-bright);
  border-left-color: var(--text-bright);
}

/* --- Mobile sidebar toggle --- */
.docs-sidebar-toggle {
  display: none;
  position: fixed;
  bottom: 20px;
  right: 20px;
  z-index: 60;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 28px;
  padding: 12px 20px;
  font-size: 0.85rem;
  font-weight: 600;
  font-family: var(--font-body);
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  align-items: center;
  gap: 8px;
}

.docs-sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 45;
}

/* --- Docs Main Content --- */
.docs-main {
  flex: 1;
  margin-left: 280px;
  min-width: 0;
}

.docs-content {
  max-width: 820px;
  margin: 0 auto;
  padding: 40px 48px 80px;
}

/* --- Docs Typography --- */
.docs-section {
  padding-bottom: 48px;
  margin-bottom: 48px;
  border-bottom: 1px solid var(--border);
  scroll-margin-top: 90px;
}

.docs-section:last-child {
  border-bottom: none;
}

.docs-content h2 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 400;
  color: var(--text-bright);
  margin-bottom: 12px;
  padding-top: 12px;
  letter-spacing: -0.02em;
  scroll-margin-top: 90px;
}

.docs-content h3 {
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-top: 40px;
  margin-bottom: 12px;
  letter-spacing: -0.01em;
  scroll-margin-top: 90px;
}

.docs-content h4 {
  font-size: 1.05rem;
  font-weight: 650;
  color: var(--accent);
  margin-top: 28px;
  margin-bottom: 10px;
}

.docs-content p {

<body>
  
  <script>
  
  document.addEventListener('click', function(e) {
    var link = e.target.closest('a');
    if (!link) return;
    var href = link.getAttribute('href');
    if (!href || href.indexOf('#') === -1) return;
    var hashIndex = href.indexOf('#');
    var hash = href.substring(hashIndex);
    var urlPart = href.substring(0, hashIndex);

    
    if (urlPart) {
      var currentUrl = window.location.origin + window.location.pathname;
      
      var targetBase = urlPart.replace(/\/$/, '');
      var currentBase = currentUrl.replace(/\/$/, '');
      if (targetBase !== currentBase) {
        
        return;
      }
    }

    
    var target = document.querySelector(hash);
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      window.history.pushState(null, '', hash);
      var navLinks = document.querySelector('.nav-links');
      if (navLinks) navLinks.classList.remove('open');
    }
  });

  
  function copyCode(btn) {
    var code = btn.closest('.code-block').querySelector('.code-body').textContent;
    navigator.clipboard.writeText(code).then(function() {
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
    });
  }
</script>
