<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <style>
    {{ partial "css/main.css" . | safeCSS }}

</head>
<body>
  {{ block "main" . }}{{ end }}

</body>
</html>
