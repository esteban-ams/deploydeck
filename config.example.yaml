# DeployDeck Configuration Example
# Copy this file to config.yaml and customize for your setup

server:
  port: 9000
  host: "0.0.0.0"
  tls:
    enabled: false
    cert_file: "/path/to/cert.pem"
    key_file: "/path/to/key.pem"
  # ip_whitelist restricts the /api/deploy and /api/rollback endpoints to
  # specific source IPs or CIDR ranges. /api/health and /api/deployments are
  # never filtered. When this list is empty (or omitted) all IPs are allowed.
  # ip_whitelist:
  #   - "10.0.0.0/8"         # internal network
  #   - "192.168.1.42"       # specific CI server

auth:
  # Generate with: openssl rand -hex 32
  webhook_secret: "your-secret-here-replace-this"

# Rate limiting for the /api/deploy and /api/rollback endpoints.
# Each remote IP is tracked independently using a token-bucket algorithm.
# Overrides: DEPLOYDECK_RATE_LIMIT_RPM (requests_per_minute), DEPLOYDECK_RATE_LIMIT_BURST (burst_size)
rate_limit:
  enabled: true
  requests_per_minute: 10   # sustained requests allowed per IP per minute
  burst_size: 5             # maximum burst above the steady rate

dashboard:
  enabled: false
  username: "admin"
  password: "change-me"

logging:
  level: "info"   # debug, info, warn, error
  format: "text"  # json or text

services:
  # Example service — pull mode (default)
  # Pulls pre-built images from a registry, then deploys
  myapp:
    compose_file: "/opt/apps/docker-compose.yml"
    service_name: "myapp"
    working_dir: "/opt/apps"

    # Deploy mode: "pull" (default) or "build"
    # pull:  docker compose pull + docker compose up -d
    # build: git clone + docker compose build + docker compose up -d
    # mode: "pull"

    # Deployment timeout (default: 5m for pull, 10m for build)
    # timeout: 5m

    health_check:
      enabled: true
      url: "http://localhost:8080/health"
      timeout: 30s
      interval: 2s
      retries: 10

    # Rollback: tags current image before deploy, restores on failure
    rollback:
      enabled: true
      keep_images: 3    # number of rollback image tags to keep

    env:
      DEPLOY_ENV: "production"

  # Example service — build mode
  # Clones the repo from GitHub/GitLab webhook payload, builds, and deploys
  # myapp-build:
  #   compose_file: "docker-compose.yml"          # relative to repo root
  #   service_name: "myapp"
  #   working_dir: "/opt/deploydeck/builds/myapp"   # where repo is cloned
  #   mode: "build"
  #   branch: "main"                              # only deploy pushes to this branch
  #   repo: "https://github.com/user/repo.git"    # fallback URL for manual triggers
  #   clone_token: ""                              # for private repos (or use DEPLOYDECK_CLONE_TOKEN env var)
  #   clone_token_file: "/run/secrets/clone_token" # alternative: read token from file (Docker secrets)
  #   timeout: 10m                                 # deployment timeout (default: 10m for build mode)
  #   prune_after_build: true                      # clean Docker build cache after successful deploy
  #   health_check:
  #     enabled: true
  #     url: "http://localhost:8081/health"
  #     timeout: 60s                               # builds may take longer
  #     interval: 5s
  #     retries: 12
  #   rollback:
  #     enabled: true                              # now works in build mode via image tagging
  #     keep_images: 3                             # keep last 3 rollback snapshots
