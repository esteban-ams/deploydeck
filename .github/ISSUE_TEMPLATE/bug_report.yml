name: Bug Report
description: Report a bug in DeployDeck
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: DeployDeck Version
      description: Output of `deploydeck --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: deploy-mode
    attributes:
      label: Deploy Mode
      options:
        - Pull
        - Build
        - Both
        - N/A
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (amd64)
        - Linux (arm64)
        - macOS (Intel)
        - macOS (Apple Silicon)
        - Docker container
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Configure service with...
        2. Send webhook...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Relevant parts of your config.yaml (redact secrets!)
      render: yaml

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output
      render: text
