# GitHub Actions workflow to deploy Hugo site to GitHub Pages.
#
# USAGE: Copy this file to your repository's .github/workflows/ directory.
# Do NOT use it from website/.github/ - GitHub only reads from the repo root.
#
# Requires: GitHub Pages configured to deploy from GitHub Actions
# (Settings > Pages > Source > GitHub Actions)

name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "website/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    working-directory: website

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build
        run: hugo --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
